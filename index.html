<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Смакота - Меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --tg-theme-secondary-bg-color: #f5f5f5;

            --primary: #f65e07;
            --primary-gradient: linear-gradient(135deg, #f65e07 0%, #ff8a00 100%);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --card-radius: 16px;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            background-color: var(--tg-theme-bg-color);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Categories */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 10px 12px;
            background-color: var(--tg-theme-bg-color);
            gap: 6px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            white-space: nowrap;
            padding: 8px 16px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            color: var(--tg-theme-hint-color);
        }

        .category-chip.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 3px 10px rgba(246, 94, 7, 0.3);
        }

        /* Menu Grid */
        .menu-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-bottom: 100px;
        }

        /* Compact Card */
        .card {
            background-color: var(--tg-theme-bg-color);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeInUp 0.4s var(--ease) both;
        }

        .card:active {
            transform: scale(0.97);
        }

        /* Image - показуємо ВСЮ картинку без обрізки */
        .card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            background: linear-gradient(135deg, #fef3e8 0%, #fff8f0 100%);
            display: block;
        }

        .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            color: white;
            padding: 3px 8px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .card-body {
            padding: 10px 12px 6px;
        }

        .card-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin: 0;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-desc {
            font-size: 0.75rem;
            color: var(--tg-theme-hint-color);
            margin: 4px 0 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 6px 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
        }

        .add-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(246, 94, 7, 0.2);
            transition: transform 0.15s;
            line-height: 1;
        }

        .add-btn:active {
            transform: scale(0.85);
        }

        /* Cart Floating Bar */
        .cart-status {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: #1a1a1a;
            color: white;
            padding: 16px 20px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(150px);
            transition: transform 0.5s var(--ease);
            z-index: 1000;
            cursor: pointer;
        }

        .cart-status.visible {
            transform: translateY(0);
        }

        .cart-btn-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .cart-count-badge {
            background: var(--primary);
            color: white;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.75rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive: 3 columns for tablets/desktop */
        @media (min-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 14px;
                padding: 16px;
            }

            .card-title {
                font-size: 1rem;
            }
        }

        /* 4 columns for large screens */
        @media (min-width: 900px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🍕 СМАКОТА</h1>
    </div>

    <div class="categories" id="cat-list"></div>

    <div class="menu-grid" id="menu-items"></div>

    <div class="cart-status" id="cart-bar" onclick="sendOrder()">
        <div class="cart-btn-label">
            <span class="cart-count-badge" id="cart-count">0</span>
            <span>КОШИК</span>
        </div>
        <span id="cart-total">0 грн</span>
    </div>

    <script src="data.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        try { tg.enableClosingConfirmation(); } catch (e) { }

        // Telegram theme colors
        if (tg.themeParams) {
            if (tg.themeParams.bg_color) document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color);
            if (tg.themeParams.text_color) document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color);
            if (tg.themeParams.hint_color) document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color);
            if (tg.themeParams.secondary_bg_color) document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color);
        }

        let cart = {};
        let currentCategory = 'all';

        function renderCategories() {
            const list = document.getElementById('cat-list');
            const cats = [{ id: 'all', name: 'Усе' }, ...menuData.categories];
            list.innerHTML = cats.map(c => `
            <div class="category-chip ${currentCategory === c.id ? 'active' : ''}" 
                 onclick="setCategory('${c.id}')">${c.name}</div>
        `).join('');
        }

        function setCategory(id) {
            currentCategory = id;
            renderCategories();
            renderMenu();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderMenu() {
            const grid = document.getElementById('menu-items');
            const items = currentCategory === 'all'
                ? menuData.items
                : menuData.items.filter(i => i.category_id === currentCategory);

            grid.innerHTML = items.map((item, index) => `
            <div class="card" style="animation-delay: ${Math.min(index * 0.03, 0.5)}s">
                <div style="position:relative">
                    <img src="${item.image_url}" alt="${item.name}" 
                         loading="lazy"
                         onerror="this.src='https://placehold.co/400x300/f65e07/ffffff?text=${encodeURIComponent(item.name.substring(0, 15))}'">
                    ${item.weight ? `<div class="badge">${item.weight}</div>` : ''}
                </div>
                <div class="card-body">
                    <p class="card-title">${item.name}</p>
                    ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
                </div>
                <div class="card-footer">
                    <span class="price">${item.price} ₴</span>
                    <button class="add-btn" onclick="addToCart(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price})">+</button>
                </div>
            </div>
        `).join('');
        }

        function addToCart(id, name, price) {
            if (!cart[id]) cart[id] = { count: 0, name: name, price: price };
            cart[id].count++;
            updateCart();
            try { tg.HapticFeedback.impactOccurred('medium'); } catch (e) { }
        }

        function updateCart() {
            let count = 0, total = 0;
            for (let id in cart) {
                count += cart[id].count;
                total += cart[id].count * cart[id].price;
            }

            const bar = document.getElementById('cart-bar');
            if (count > 0) {
                bar.classList.add('visible');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = `${total} ₴`;
            } else {
                bar.classList.remove('visible');
            }
        }

        function sendOrder() {
            if (Object.keys(cart).length === 0) return;
            try { tg.HapticFeedback.notificationOccurred('success'); } catch (e) { }
            tg.sendData(JSON.stringify({ action: 'webapp_order', items: cart }));
            tg.close();
        }

        renderCategories();
        renderMenu();
    </script>
</body>

</html>
