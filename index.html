<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Смакота - Меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --tg-theme-secondary-bg-color: #f5f5f5;
            --primary: #f65e07;
            --primary-gradient: linear-gradient(135deg, #f65e07 0%, #ff8a00 100%);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --card-radius: 20px;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* UI Overlays */
        #cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s var(--ease);
        }

        #cart-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tg-theme-bg-color);
            border-radius: 24px 24px 0 0;
            z-index: 1001;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease);
            max-height: 85vh;
            overflow-y: auto;
        }

        .header {
            background: var(--tg-theme-bg-color);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 12px;
            gap: 8px;
            scrollbar-width: none;
            background: var(--tg-theme-bg-color);
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 18px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            color: var(--tg-theme-hint-color);
        }

        .category-chip.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 10px rgba(246, 94, 7, 0.3);
        }

        .menu-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 110px;
        }

        .card {
            background: var(--tg-theme-bg-color);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .card-body {
            padding: 12px;
            flex-grow: 1;
        }

        .card-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.2;
        }

        .card-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .add-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cart Floating Bar */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: #1a1a1a;
            color: white;
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(150px);
            transition: 0.4s var(--ease);
            z-index: 500;
        }

        .cart-bar.visible {
            transform: translateY(0);
        }

        /* Cart List inside modal */
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color);
        }

        .cart-item-info {
            flex-grow: 1;
            margin-left: 10px;
        }

        .cart-item-title {
            font-weight: 600;
            margin: 0;
            font-size: 0.95rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--tg-theme-secondary-bg-color);
            padding: 5px 12px;
            border-radius: 100px;
        }

        .qty-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--primary);
            width: 24px;
        }

        .item-num {
            color: var(--tg-theme-hint-color);
            font-size: 0.8rem;
            font-weight: 700;
            width: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(246, 94, 7, 0.3);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🍕 СМАКОТА</h1>
    </div>
    <div class="categories" id="cat-list"></div>
    <div class="menu-grid" id="menu-items"></div>

    <div class="cart-bar" id="cart-bar" onclick="toggleCart(true)">
        <span>🛒 <span id="cart-count">0</span> страв</span>
        <span id="cart-total">0 ₴</span>
    </div>

    <!-- Cart Modal -->
    <div id="cart-overlay" onclick="toggleCart(false)"></div>
    <div id="cart-modal">
        <h2 style="margin-top:0">Мій кошик</h2>
        <div id="cart-items-list"></div>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:1.2rem; font-weight:800">
            <span>Разом:</span>
            <span id="modal-total" style="color:var(--primary)">0 ₴</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>

    <script src="data.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = {};
        let currentCategory = 'all';

        function renderCategories() {
            const list = document.getElementById('cat-list');
            const cats = [{ id: 'all', name: 'Усе' }, ...menuData.categories];
            list.innerHTML = cats.map(c => `
                <div class="category-chip ${currentCategory === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">${c.name}</div>
            `).join('');
        }

        function setCategory(id) {
            currentCategory = id;
            renderCategories();
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menu-items');
            const items = currentCategory === 'all' ? menuData.items : menuData.items.filter(i => i.category_id === currentCategory);
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <img src="${item.image_url}" onerror="this.src='https://placehold.co/400x400/f65e07/ffffff?text=${encodeURIComponent(item.name.substring(0, 10))}'">
                    <div class="card-body">
                        <p class="card-title">${item.name}</p>
                        <p class="card-price">${item.price} ₴</p>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id},'${item.name.replace(/'/g, "\\'")}',${item.price})">+</button>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            if (!cart[id]) cart[id] = { count: 0, name: name, price: price, id: id };
            cart[id].count++;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function editQty(id, delta) {
            if (!cart[id]) return;
            cart[id].count += delta;
            if (cart[id].count <= 0) delete cart[id];
            updateUI();
            renderCartList();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateUI() {
            let count = 0, total = 0;
            for (let id in cart) { count += cart[id].count; total += cart[id].count * cart[id].price; }
            const bar = document.getElementById('cart-bar');
            if (count > 0) {
                bar.classList.add('visible');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = `${total} ₴`;
            } else {
                bar.classList.remove('visible');
                toggleCart(false);
            }
        }

        function toggleCart(show) {
            const overlay = document.getElementById('cart-overlay');
            const modal = document.getElementById('cart-modal');
            if (show) {
                renderCartList();
                overlay.style.display = 'block';
                setTimeout(() => { overlay.style.opacity = '1'; modal.style.transform = 'translateY(0)'; }, 10);
            } else {
                overlay.style.opacity = '0';
                modal.style.transform = 'translateY(100%)';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            }
        }

        function renderCartList() {
            const list = document.getElementById('cart-items-list');
            let total = 0, i = 1;
            let html = '';
            for (let id in cart) {
                const item = cart[id];
                total += item.count * item.price;
                html += `
                    <div class="cart-item">
                        <span class="item-num">${i++}.</span>
                        <div class="cart-item-info">
                            <p class="cart-item-title">${item.name}</p>
                            <span class="cart-item-price">${item.price} ₴</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="editQty(${id}, -1)">−</button>
                            <span style="font-weight:700">${item.count}</span>
                            <button class="qty-btn" onclick="editQty(${id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html || '<p style="text-align:center; color:gray">Кошик порожній</p>';
            document.getElementById('modal-total').innerText = `${total} ₴`;
        }

        function checkout() {
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify({ action: 'webapp_order', items: cart }));
            tg.close();
        }

        renderCategories(); renderMenu();
    </script>
</body>

</html>
