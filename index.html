<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Смакота - Меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #f65e07;
            --tg-theme-button-color: #f65e07;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f5f5f5;
            
            --primary: #f65e07;
            --primary-gradient: linear-gradient(135deg, #f65e07 0%, #ff8a00 100%);
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
            --card-radius: 20px;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            background-color: var(--tg-theme-bg-color);
            padding: 20px 16px 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Categories Scrollbar */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            background-color: var(--tg-theme-bg-color);
            gap: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories::-webkit-scrollbar { display: none; }

        .category-chip {
            white-space: nowrap;
            padding: 10px 20px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            border: 1.5px solid transparent;
            color: var(--tg-theme-hint-color);
        }

        .category-chip.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(246, 94, 7, 0.3);
            transform: translateY(-2px);
        }

        /* Menu Grid */
        .menu-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding-bottom: 100px;
        }

        .card {
            background-color: var(--tg-theme-bg-color);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            position: relative;
        }

        .card:active {
            transform: scale(0.98);
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #eee;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s var(--ease);
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--tg-theme-hint-color);
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 0 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--tg-theme-text-color);
        }

        .add-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(246, 94, 7, 0.2);
            transition: all 0.2s;
        }

        .add-btn:active {
            transform: scale(0.9);
            opacity: 0.9;
        }

        /* Cart Floating Bar */
        .cart-status {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: #000;
            color: white;
            padding: 18px 24px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(150px);
            transition: transform 0.5s var(--ease);
            z-index: 1000;
            cursor: pointer;
        }

        .cart-status.visible {
            transform: translateY(0);
        }

        .cart-btn-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-count-badge {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.8rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeInUp 0.5s var(--ease) both;
        }

        /* Grid for Tablets */
        @media (min-width: 600px) {
            .menu-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍕 СМАКОТА</h1>
    <div id="user-info"></div>
</div>

<div class="categories" id="cat-list">
    <!-- Categories will be loaded here -->
</div>

<div class="menu-grid" id="menu-items">
    <!-- Items will be loaded here -->
</div>

<div class="cart-status" id="cart-bar" onclick="sendOrder()">
    <div class="cart-btn-label">
        <span class="cart-count-badge" id="cart-count">0</span>
        <span>ПЕРЕЙТИ ДО КОШИКА</span>
    </div>
    <span id="cart-total">0 грн</span>
</div>

<script src="data.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    // Set colors from Telegram
    document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor);
    document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor);

    let cart = {};
    let currentCategory = 'all';

    function renderCategories() {
        const list = document.getElementById('cat-list');
        // Add All category
        const cats = [{id: 'all', name: 'Усе'}, ...menuData.categories];
        list.innerHTML = cats.map(c => `
            <div class="category-chip ${currentCategory === c.id ? 'active' : ''}" 
                 onclick="setCategory('${c.id}')">${c.name}</div>
        `).join('');
    }

    function setCategory(id) {
        currentCategory = id;
        renderCategories();
        renderMenu();
        // Scroll to top of menu
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderMenu() {
        const grid = document.getElementById('menu-items');
        const items = currentCategory === 'all' 
            ? menuData.items 
            : menuData.items.filter(i => i.category_id === currentCategory);

        grid.innerHTML = items.map((item, index) => `
            <div class="card" style="animation-delay: ${index * 0.05}s">
                <div class="image-container">
                    <img src="${item.image_url}" alt="${item.name}" 
                         onerror="this.src='https://placehold.co/600x400/f65e07/ffffff?text=${encodeURIComponent(item.name)}'">
                    ${item.weight ? `<div class="badge">${item.weight}</div>` : ''}
                </div>
                <div class="card-body">
                    <p class="card-title">${item.name}</p>
                    <p class="card-desc">${item.description || "Смачна страва від нашого шефа"}</p>
                </div>
                <div class="card-footer">
                    <span class="price">${item.price} грн</span>
                    <button class="add-btn" onclick="addToCart(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price})">
                        ДОДАТИ
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, name, price) {
        if (!cart[id]) cart[id] = {count: 0, name: name, price: price};
        cart[id].count++;
        updateCart();
        
        // Haptic Feedback for premium feel
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('medium');
        }
    }

    function updateCart() {
        let count = 0;
        let total = 0;
        for (let id in cart) {
            count += cart[id].count;
            total += cart[id].count * cart[id].price;
        }

        const bar = document.getElementById('cart-bar');
        if (count > 0) {
            bar.classList.add('visible');
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `${total} грн`;
        } else {
            bar.classList.remove('visible');
        }
    }

    function sendOrder() {
        if (Object.keys(cart).length === 0) return;
        
        // Final haptic before sending
        tg.HapticFeedback.notificationOccurred('success');
        
        const orderData = {
            action: 'webapp_order',
            items: cart
        };
        
        tg.sendData(JSON.stringify(orderData));
        tg.close();
    }

    // Initial render
    renderCategories();
    renderMenu();

</script>
</body>
</html>
